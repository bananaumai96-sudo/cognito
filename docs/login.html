<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cognito Login Sample</title>
</head>
<body>

<h2>ログイン中...</h2>

<script>
const domain = "https://my-sample-auth-domain-12345.auth.ap-northeast-1.amazoncognito.com";
const clientId = "51r5lv57lkjr5m53c4m1rr5gmc";
const redirectUri = "https://d3ca0c4sh5rria.cloudfront.net";
const SECURE_API= "https://ixvlupemfe.execute-api.ap-northeast-1.amazonaws.com/secure";
const TOKEN_API= "https://ixvlupemfe.execute-api.ap-northeast-1.amazonaws.com/token";

// =====================
// 初期処理
// =====================
window.onload = async function () {
  const token = await init();
  console.log('Bearer ' + access_token);
 

  if (!token) {
    // トークンなければログイン画面へ
    login();
  } else {
    // ログイン後
    console.log("ログイン成功:", token);
  }

   const result = getToken();
   console.log("API結果:", result);
};

// =====================
// ログイン
// =====================
function login() {
  const url = `${domain}/login?response_type=code&client_id=${clientId}&redirect_uri=${redirectUri}&scope=openid+email+profile`;
  window.location.href = url;
}

// =====================
// トークン取得
// =====================

async function getToken() {
 const res = await fetch(SECURE_API, {
    method: "GET",
    headers: {
      Authorization: `Bearer ${access_token}`
    }
  });

  return res.json()
}

let access_token;
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  console.log("code:", code);

  if (!code) return null;

  const res = await fetch(TOKEN_API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ code })
  });

  const text = await res.text();

  if (!res.ok) {
    console.error("token API error:", text);
    return null;
  }

  const data = await res.json();
  access_token = data.access_token;

  return access_token;
}


</script>

</body>
</html>
