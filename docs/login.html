<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cognito Login Sample</title>
</head>
<body>

<h2>ログイン中...</h2>

<script>
const domain = "https://my-sample-auth-domain-12345.auth.ap-northeast-1.amazoncognito.com";
const clientId = "51r5lv57lkjr5m53c4m1rr5gmc";
const redirectUri = "https://d3ca0c4sh5rria.cloudfront.net";
const API_URL= "https://2ie3z6tl25.execute-api.ap-northeast-1.amazonaws.com/secure";

// =====================
// 初期処理
// =====================
window.onload = function () {
  const token = getToken();

  if (!token) {
    // トークンなければログイン画面へ
    login();
  } else {
    // ログイン後
    console.log("ログイン成功:", token);
  }
};

// =====================
// ログイン
// =====================
function login() {
  const url = `${domain}/login?response_type=token&client_id=${clientId}&redirect_uri=${redirectUri}`;
  window.location.href = url;
}

// =====================
// トークン取得
// =====================
function getToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  return params.get("id_token");
}


</script>

</body>
</html>
