name: Terraform CI/CD

on:
  pull_request:
    paths:
      - 'dev/**'
  push:
    branches: [main]
    paths:
      - 'dev/**'

  workflow_dispatch:
    inputs:
      confirm:
        description: "type APPLY or DESTROY to confirm"
        required: true

concurrency:
  group: terraform-dev
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    
    environment: secrets
    env:
      TF_VAR_username: ${{ secrets.username }}
      TF_VAR_attributes_email: ${{ secrets.attributes_email }}
      TF_VAR_temporary_password: ${{ secrets.temporary_password }}
      TF_VAR_policy_arn: ${{ secrets.policy_arn }}
      TF_VAR_db_policy_arn: ${{ secrets.db_policy_arn }}

    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v3

      - name: AWS認証（OIDC）
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::251456382610:role/github-action-role
          aws-region: ap-northeast-1

      - run: terraform init
        working-directory: ./dev

      - run: terraform fmt -check
        working-directory: ./dev

      - run: terraform validate
        working-directory: ./dev

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -var-file="dev.tfvars"
        working-directory: ./dev

      - name: Terraform Apply
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: terraform apply -auto-approve -input=false -var-file="dev.tfvars"
        working-directory: ./dev

      - name: Terraform Destroy
        if: ${{ github.event.inputs.confirm == 'DESTROY' }}
        run: terraform destroy -auto-approve -input=false -var-file="dev.tfvars"
        working-directory: ./dev
